<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑笔记</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-color);
        }

        .editor-header {
            background: white;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: transparent;
            border: none;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #f0f0f0;
            color: var(--primary-color);
        }

        .title-input {
            font-size: 18px;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 300px;
            outline: none;
            transition: border-color 0.3s;
        }

        .title-input:focus {
            border-color: var(--primary-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: #f8f9fa;
        }

        .editor-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
        }

        .editor-pane {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
        }

        .editor-pane textarea {
            flex: 1;
            padding: 20px;
            border: none;
            resize: none;
            font-size: 14px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            line-height: 1.8;
            outline: none;
            background: #fafafa;
        }

        .editor-pane textarea::placeholder {
            color: #aaa;
        }

        .preview-pane {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .preview-pane.show {
            display: block;
        }

        .pane-header {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .markdown-body {
            padding: 20px;
        }

        .preview .welcome {
            display: none;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <header class="editor-header">
            <div class="header-left">
                <button class="back-btn" onclick="window.location.href='/'" title="返回">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <input type="text" id="noteTitle" class="title-input" placeholder="笔记标题">
            </div>
            <div class="header-actions">
                <button id="previewBtn" class="btn-secondary">
                    <i class="fas fa-eye"></i> 预览
                </button>
                <button id="saveBtn" class="btn-primary">
                    <i class="fas fa-save"></i> 保存
                </button>
            </div>
        </header>
        <div class="editor-body">
            <div id="editorPane" class="editor-pane">
                <textarea id="noteContent" placeholder="在这里编写 Markdown 内容...

# 示例标题

- 列表项 1
- 列表项 2

**加粗文本**

`代码`"></textarea>
            </div>
            <div id="previewPane" class="preview-pane">
                <div class="pane-header">
                    <i class="fas fa-eye"></i> 预览
                </div>
                <div id="markdownPreview" class="markdown-body"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/notes';

        // 获取 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const editName = urlParams.get('name');
        const isEditMode = !!editName;

        // 初始化
        window.addEventListener('DOMContentLoaded', async () => {
            if (isEditMode) {
                document.title = `编辑: ${editName}`;
                await loadNote(editName);
            }
        });

        // 加载笔记
        async function loadNote(name) {
            try {
                const response = await fetch(`${API_BASE}/${name}`);
                if (!response.ok) {
                    alert('笔记不存在');
                    return;
                }
                const note = await response.json();
                document.getElementById('noteTitle').value = note.name;
                document.getElementById('noteContent').value = note.content;
                updatePreview();
            } catch (error) {
                console.error('加载笔记失败:', error);
            }
        }

        // 更新预览
        function updatePreview() {
            const content = document.getElementById('noteContent').value;
            const preview = document.getElementById('markdownPreview');
            preview.innerHTML = marked.parse(content);
        }

        // 切换预览
        let isPreviewMode = false;
        document.getElementById('previewBtn').addEventListener('click', () => {
            const editorPane = document.getElementById('editorPane');
            const previewPane = document.getElementById('previewPane');
            const previewBtn = document.getElementById('previewBtn');

            isPreviewMode = !isPreviewMode;
            if (isPreviewMode) {
                updatePreview();
                editorPane.style.display = 'none';
                previewPane.classList.add('show');
                previewBtn.innerHTML = '<i class="fas fa-edit"></i> 编辑';
            } else {
                editorPane.style.display = 'flex';
                previewPane.classList.remove('show');
                previewBtn.innerHTML = '<i class="fas fa-eye"></i> 预览';
            }
        });

        // 保存笔记
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const title = document.getElementById('noteTitle').value.trim();
            const content = document.getElementById('noteContent').value;

            if (!title) {
                alert('请输入笔记标题');
                return;
            }

            const noteData = {
                title: title,
                content: content
            };

            try {
                let response;
                if (isEditMode) {
                    // 更新现有笔记
                    response = await fetch(`${API_BASE}/${editName}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(noteData)
                    });
                } else {
                    // 创建新笔记
                    response = await fetch(API_BASE, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(noteData)
                    });
                }

                if (response.ok) {
                    alert('保存成功');
                    window.location.href = '/';
                } else {
                    const error = await response.json();
                    alert('保存失败: ' + (error.error || '未知错误'));
                }
            } catch (error) {
                console.error('保存笔记失败:', error);
                alert('保存失败，请重试');
            }
        });

        // 实时预览（编辑模式下）
        document.getElementById('noteContent').addEventListener('input', () => {
            if (!isPreviewMode) {
                // 可以在这里添加自动保存功能
            }
        });

        // 键盘快捷键
        document.getElementById('noteContent').addEventListener('keydown', (e) => {
            // Ctrl+S 保存
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                document.getElementById('saveBtn').click();
            }
            // Ctrl+P 预览
            if (e.ctrlKey && e.key === 'p') {
                e.preventDefault();
                document.getElementById('previewBtn').click();
            }
        });
    </script>
</body>
</html>
